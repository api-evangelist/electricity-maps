naftiko: 1.0.0-alpha2
info:
  label: Electricity Maps API
  description: The Electricity Maps API delivers real-time, historical, and forecasted electricity grid signals worldwide,
    including carbon intensity, power breakdown by source, renewable and carbon-free percentages, electricity flows, total
    and net load, and day-ahead pricing. Each signal is available in three temporality variants (latest, past, forecast) and
    can be queried by zone identifier, geographic coordinates, or data center provider/region.
  tags:
  - Electricity
  - Maps
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: electricity-maps
    baseUri: https://api.electricitymap.org
    description: Electricity Maps API HTTP API.
    authentication:
      type: apikey
      in: header
      name: auth-token
      value: '{{ELECTRICITY_MAPS_TOKEN}}'
    resources:
    - name: v3-zones
      path: /v3/zones
      operations:
      - name: listzones
        method: GET
        description: List available zones
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v3-zone
      path: /v3/zone
      operations:
      - name: locatezone
        method: GET
        description: Locate a zone by coordinates
        inputParameters:
        - name: lon
          in: query
          type: number
          required: true
        - name: lat
          in: query
          type: number
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v3-data-centers
      path: /v3/data-centers
      operations:
      - name: listdatacenters
        method: GET
        description: List available data centers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v3-carbon-intensity-temporality
      path: /v3/carbon-intensity/{temporality}
      operations:
      - name: getcarbonintensity
        method: GET
        description: Get carbon intensity signal
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v3-fossil-only-carbon-intensity-temporality
      path: /v3/fossil-only-carbon-intensity/{temporality}
      operations:
