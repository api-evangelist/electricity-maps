naftiko: 1.0.0-alpha2
info:
  label: Electricity Maps API — ElectricityMix
  description: 'Electricity Maps API — ElectricityMix. 1 operations. Lead operation: Get electricity mix. Self-contained Naftiko
    capability covering one Electricity Maps business surface.'
  tags:
  - Electricity Maps
  - ElectricityMix
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ELECTRICITY_MAPS_API_KEY: ELECTRICITY_MAPS_API_KEY
capability:
  consumes:
  - type: http
    namespace: electricity-maps-electricitymix
    baseUri: https://api.electricitymap.org
    description: Electricity Maps API — ElectricityMix business capability. Self-contained, no shared references.
    resources:
    - name: v3-electricity-mix-temporality
      path: /v3/electricity-mix/{temporality}
      operations:
      - name: getelectricitymix
        method: GET
        description: Get electricity mix
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: auth-token
      value: '{{env.ELECTRICITY_MAPS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: electricity-maps-electricitymix-rest
    port: 8080
    description: REST adapter for Electricity Maps API — ElectricityMix. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v3/electricity-mix/{temporality}
      name: v3-electricity-mix-temporality
      description: REST surface for v3-electricity-mix-temporality.
      operations:
      - method: GET
        name: getelectricitymix
        description: Get electricity mix
        call: electricity-maps-electricitymix.getelectricitymix
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: electricity-maps-electricitymix-mcp
    port: 9090
    transport: http
    description: MCP adapter for Electricity Maps API — ElectricityMix. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-electricity-mix
      description: Get electricity mix
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: electricity-maps-electricitymix.getelectricitymix
      outputParameters:
      - type: object
        mapping: $.
