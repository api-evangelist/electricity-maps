apis:
  - aid: electricity-maps:electricity-maps
    name: Electricity Maps API
    description: >-
      The Electricity Maps API exposes carbon intensity, electricity mix,
      renewable and carbon-free percentages, electricity flows, total and
      net load, and day-ahead pricing for hundreds of zones worldwide.
      Each signal is available in three temporality variants (latest, past,
      and forecast) and supports zone, coordinate, and data-center lookups
      with configurable temporal granularity and emission factor type.
    humanURL: https://app.electricitymaps.com/docs/getting-started
