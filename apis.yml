aid: electricity-maps
name: Electricity Maps
description: >-
  Electricity Maps tracks the carbon intensity and electricity mix of power
  grids around the world. Their commercial API delivers real-time,
  historical, and forecasted signals for carbon intensity, power source
  breakdown, renewable and carbon-free percentages, electricity flows, grid
  load, and day-ahead pricing across hundreds of geographic zones, enabling
  data centers, software platforms, and sustainability teams to make
  emissions-aware decisions.
